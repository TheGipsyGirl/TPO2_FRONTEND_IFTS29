<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" role="img" aria-label="Students collaborating in an interactive English class">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF1FF"/>
      <stop offset="1" stop-color="#DCE9FF"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <rect width="520" height="420" rx="26" fill="url(#bg)"/>

  <!-- board -->
  <rect x="58" y="46" width="404" height="190" rx="16" fill="url(#board)"/>
  <text x="86" y="118" font-family="Georgia, serif" font-style="italic" font-size="40" fill="#fff" font-weight="700">Hello!</text>
  <text x="86" y="160" font-family="Arial, sans-serif" font-size="18" fill="#BBD2FF">Welcome to your English class</text>
  <line x1="86" y1="182" x2="300" y2="182" stroke="#7FA8FF" stroke-width="3" stroke-linecap="round"/>
  <line x1="86" y1="200" x2="244" y2="200" stroke="#7FA8FF" stroke-width="3" stroke-linecap="round" opacity=".7"/>
  <circle cx="404" cy="96" r="26" fill="#22C55E"/>
  <text x="404" y="106" text-anchor="middle" font-family="Arial" font-size="26" fill="#fff">A+</text>

  <!-- desk -->
  <rect x="40" y="300" width="440" height="14" rx="7" fill="#C9D8F5"/>

  <!-- student 1 -->
  <g transform="translate(120,250)">
    <circle cx="0" cy="0" r="26" fill="#F6C8A0"/>
    <path d="M-26 0 a26 26 0 0 1 52 0z" fill="#3B2A1F"/>
    <rect x="-30" y="30" width="60" height="55" rx="20" fill="#1D4ED8"/>
  </g>
  <!-- student 2 -->
  <g transform="translate(260,250)">
    <circle cx="0" cy="0" r="26" fill="#E9B68A"/>
    <path d="M-26 -2 a26 26 0 0 1 52 0 l0 6 -52 0z" fill="#4A2E1A"/>
    <rect x="-30" y="30" width="60" height="55" rx="20" fill="#22C55E"/>
  </g>
  <!-- student 3 -->
  <g transform="translate(400,250)">
    <circle cx="0" cy="0" r="26" fill="#F6C8A0"/>
    <path d="M-26 0 a26 26 0 0 1 52 0z" fill="#1F2937"/>
    <rect x="-30" y="30" width="60" height="55" rx="20" fill="#3B82F6"/>
  </g>

  <!-- speech bubble -->
  <g transform="translate(330,150)">
    <rect x="0" y="0" width="120" height="54" rx="14" fill="#fff"/>
    <path d="M24 54 l-10 18 28 -18z" fill="#fff"/>
    <text x="60" y="34" text-anchor="middle" font-family="Arial" font-size="18" fill="#1D4ED8" font-weight="700">Let's talk!</text>
  </g>
</svg>
